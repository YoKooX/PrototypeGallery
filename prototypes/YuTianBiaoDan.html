<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>小T营销助手·客户方案预填原型</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #f2f4f8;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, 'Noto Sans', sans-serif;
            padding: 20px 16px 40px;
            color: #1f2a3e;
        }

        /* 主容器 — 卡片风格 */
        .app-container {
            max-width: 500px;
            margin: 0 auto;
            background: #ffffff;
            border-radius: 32px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.05), 0 2px 4px rgba(0, 0, 0, 0.02);
            overflow: hidden;
            padding: 20px 20px 32px;
            position: relative;
        }

        /* 头部区域：只保留右上角大按钮，无聊天框 */
        .header-with-btn {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 24px;
        }

        /* 放大版【已生成方案】按钮 */
        .action-top-btn {
            background: #2a7de1;
            border: none;
            color: white;
            padding: 12px 28px;
            border-radius: 25px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-top-btn:hover {
            background: #1e6dd6;
            transform: translateY(-1px);
        }

        .action-top-btn-secondary {
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 48px;
            padding: 14px 28px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-left: 12px;
        }

        .action-top-btn-secondary:active {
            background: #f1f5f9;
            transform: scale(0.97);
        }

        .action-top-btn:active {
            background: #1a5bbf;
            transform: scale(0.96);
        }

        /* 表单区域 */
        .form-section {
            margin-top: 8px;
        }

        .form-card {
            background: #ffffff;
            border-radius: 28px;
            border: 1px solid #edf2f7;
            overflow: hidden;
        }

        .form-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
            padding-bottom: 8px;
            border-bottom: 2px solid #eef2ff;
        }

        .form-title span {
            background: #eef2ff;
            border-radius: 20px;
            font-size: 13px;
            padding: 2px 10px;
            color: #1e40af;
        }

        .field-group {
            margin-bottom: 20px;
        }

        .field-label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #1f2a44;
        }

        .required-star {
            color: #e53e3e;
            font-size: 12px;
        }

        .field-hint {
            font-size: 12px;
            color: #7b8a9b;
            margin-top: 4px;
            margin-left: 4px;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 15px;
            font-family: inherit;
            background: #ffffff;
            transition: 0.2s;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #2a7de1;
            box-shadow: 0 0 0 3px rgba(42, 125, 225, 0.1);
        }

        textarea {
            resize: vertical;
            min-height: 70px;
        }

        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 12px 20px;
            margin-top: 8px;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
        }

        .checkbox-item input {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #2a7de1;
        }

        /* 多选下拉框样式 */
        .multiselect-wrapper {
            position: relative;
            width: 100%;
        }

        .multiselect-btn {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #e2e8f0;
            border-radius: 20px;
            font-size: 15px;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            text-align: left;
        }

        .multiselect-btn:hover {
            border-color: #cfdde6;
        }

        .multiselect-arrow {
            font-size: 12px;
            color: #7b8a9b;
            transition: transform 0.2s;
        }

        .multiselect-wrapper.open .multiselect-arrow {
            transform: rotate(180deg);
        }

        .multiselect-panel {
            position: absolute;
            top: calc(100% + 4px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
            padding: 8px 0;
            z-index: 100;
            display: none;
            max-height: 240px;
            overflow-y: auto;
        }

        .multiselect-wrapper.open .multiselect-panel {
            display: block;
        }

        .multiselect-option {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 14px;
            font-size: 14px;
            cursor: pointer;
        }

        .multiselect-option:hover {
            background: #f5f7fa;
        }

        .multiselect-option input {
            width: 18px;
            height: 18px;
            margin: 0;
            accent-color: #2a7de1;
        }

        .radio-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: #fafcff;
            padding: 12px 12px;
            border-radius: 20px;
            border: 1px solid #edf2f7;
        }

        .radio-item {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .radio-item input {
            width: 18px;
            height: 18px;
            margin: 0;
        }

        .inline-row {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .inline-row .field-group {
            flex: 1;
        }

        .demo-note {
            background: #f8fafd;
            border-radius: 20px;
            padding: 10px 14px;
            font-size: 12px;
            color: #5b6e8c;
            text-align: center;
            margin-top: 20px;
            margin-bottom: 24px;
        }

        /* 底部两个按钮样式 */
        .footer-buttons {
            display: flex;
            gap: 16px;
            margin-top: 8px;
        }

        .btn-secondary {
            flex: 1;
            background: white;
            border: 1px solid #cbd5e1;
            border-radius: 48px;
            padding: 14px 0;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            color: #475569;
            cursor: pointer;
            transition: all 0.2s ease;
            background: #ffffff;
        }

        .btn-secondary:active {
            background: #f1f5f9;
            transform: scale(0.97);
        }

        .btn-submit {
            flex: 1;
            background: #2a7de1;
            border: none;
            border-radius: 48px;
            padding: 14px 0;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            color: white;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(42,125,225,0.3);
        }

        .btn-submit:active {
            background: #1a5bbf;
            transform: scale(0.97);
        }

        .silent-toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1f2a3ecc;
            backdrop-filter: blur(8px);
            color: white;
            padding: 8px 20px;
            border-radius: 40px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            pointer-events: none;
            transition: opacity 0.2s;
            opacity: 0;
        }
    </style>
</head>
<body>
<div class="app-container">
    <!-- 头部：仅放大的【已生成方案】按钮，无聊天框 -->
    <div class="header-with-btn">
        <button class="action-top-btn" id="generateDirectBtn">已生成方案</button>
        <button class="action-top-btn action-top-btn-secondary" id="draftBoxBtn">草稿箱</button>
    </div>

    <!-- 预填内容表单 -->
    <div class="form-section">
        <div class="form-card">
            <div style="padding: 4px 0 0 0;">
                <div class="form-title">
                    客户方案预填内容
                    <span>智能生成</span>
                </div>
            </div>

            <!-- 客户名称 -->
            <div class="field-group">
                <div class="field-label">客户名称 <span class="field-hint">(选填)</span></div>
                <input type="text" id="customerName" placeholder="例：百步印社 / 王力云店" autocomplete="off">
            </div>

            <!-- 客户类型 (必填 + 联动资金管理场景) -->
            <div class="field-group">
                <div class="field-label"><span class="required-star">*</span> 客户类型</div>
                <select id="customerType">
                    <option value="" disabled selected>请选择客户类型</option>
                    <option value="连锁门店">连锁门店</option>
                    <option value="软件服务商">软件服务商</option>
                    <option value="线上平台">线上平台</option>
                    <option value="自助设备">自助设备</option>

                </select>
            </div>

            <!-- 所属行业 (必填) -->
            <div class="field-group">
                <div class="field-label"><span class="required-star">*</span> 所属行业</div>
                <select id="industry">
                    <option value="" disabled selected>请选择行业</option>
                    <option value="商超百购">商超百购</option>
                    <option value="餐饮">餐饮</option>
                    <option value="商旅">商旅</option>
                    <option value="加油站">加油站</option>
                    <option value="电商">电商</option>
                    <option value="医美">医美</option>
                    <option value="文旅">文旅</option>
                    <option value="休娱">休娱</option>
                    <option value="其他">其他</option>
                    <option value="连锁品牌-零售">连锁品牌-零售</option>
                    <option value="连锁品牌-健康及娱乐">连锁品牌-健康及娱乐</option>
                    <option value="连锁品牌-其他">连锁品牌-其他</option>
                    <option value="商贸">商贸</option>
                    <option value="生活服务">生活服务</option>
                    <option value="房产">房产</option>
                    <option value="物业">物业</option>
                    <option value="汽车">汽车</option>
                    <option value="政企">政企</option>
                    <option value="教育">教育</option>
                    <option value="物流运输">物流运输</option>
                    <option value="集团客户">集团客户</option>
                    <option value="基金">基金</option>
                    <option value="银行理财">银行理财</option>
                    <option value="理财子">理财子</option>
                    <option value="信托理财">信托理财</option>
                    <option value="资产管理">资产管理</option>
                    <option value="财富服务">财富服务</option>
                    <option value="银行">银行</option>
                    <option value="大消金">大消金</option>
                    <option value="保险">保险</option>
                    <option value="公共服务">公共服务</option>
                    <option value="生产制造">生产制造</option>
                    <option value="娱乐传媒">娱乐传媒</option>
                    <option value="跨境电商">跨境电商</option>
                </select>
            </div>

            <!-- 支付需求 (多选) -->
            <div class="field-group">
                <div class="field-label"><span class="required-star">*</span> 收款方式 <span class="field-hint">(多选)</span></div>
                <div class="multiselect-wrapper">
                    <div class="multiselect-btn" id="paymentMultiselectBtn">
                        <span id="paymentSelectedText">请选择收款方式</span>
                        <span class="multiselect-arrow">▼</span>
                    </div>
                    <div class="multiselect-panel" id="paymentMultiselectPanel">
                        <label class="multiselect-option">
                            <input type="checkbox" value="小程序支付"> 小程序支付
                        </label>
                        <label class="multiselect-option">
                            <input type="checkbox" value="公众号支付"> 公众号支付
                        </label>
                        <label class="multiselect-option">
                            <input type="checkbox" value="H5端支付"> H5端支付
                        </label>
                        <label class="multiselect-option">
                            <input type="checkbox" value="PC支付"> PC支付
                        </label>
                        <label class="multiselect-option">
                            <input type="checkbox" value="终端支付"> 终端支付
                        </label>
                        <label class="multiselect-option">
                            <input type="checkbox" value="APP支付"> APP支付
                        </label>
                        <label class="multiselect-option">
                            <input type="checkbox" value="分期支付"> 分期支付
                        </label>
                        <label class="multiselect-option">
                            <input type="checkbox" value="支付解决方案"> 支付解决方案
                        </label>
                        <label class="multiselect-option">
                            <input type="checkbox" value="通用场景支付"> 通用场景支付
                        </label>
                    </div>
                </div>
            </div>

            <!-- 是否分账 (必填) -->
            <div class="field-group">
                <div class="field-label"><span class="required-star">*</span> 是否分账</div>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="needSettlement" value="yes"> 是</label>
                    <label class="radio-item"><input type="radio" name="needSettlement" value="no"> 否</label>
                </div>
            </div>

            <!-- 客户是否有开发能力 (必填) -->
            <div class="field-group">
                <div class="field-label"><span class="required-star">*</span> 客户是否有开发能力</div>
                <div class="radio-group">
                    <label class="radio-item"><input type="radio" name="hasDevAbility" value="yes"> 是</label>
                    <label class="radio-item"><input type="radio" name="hasDevAbility" value="no"> 否</label>
                </div>
            </div>

            <!-- 资金管理场景 (必填，带联动逻辑) -->
            <div class="field-group">
                <div class="field-label"><span class="required-star">*</span> 资金管理方</div>
                <div id="fundSceneContainer">
                    <!-- 动态渲染单选按钮 -->
                </div>
            </div>

            <!-- 业务场景简述 + 示例 -->
            <div class="field-group">
                <div class="field-label">业务场景简述 <span class="field-hint">(选填，一句话描述)</span></div>
                <textarea id="businessDesc" placeholder="示例：24小时共享打印机，用户扫码支付后打印"></textarea>
                <div class="field-hint">尽量统一上传的文本</div>
            </div>

            <div class="demo-note">
                小T营销助手
            </div>
        </div>
    </div>

    <!-- 底部两个按钮 -->
    <div class="footer-buttons">
        <button class="btn-secondary" id="saveDraftBtn">保存到草稿箱</button>
        <button class="btn-submit" id="submitFormBtn">提交表单</button>
    </div>
</div>

<!-- 轻提示组件 -->
<div id="silentToast" class="silent-toast"></div>

<script>
    // ---------- 资金管理场景联动 (规则依据表格) ----------
    const fundSceneOptions = [
        { value: "platform_unified", label: "平台/品牌方统一收款" },
        { value: "store_independent", label: "门店/卖家独立支付入网后收款" }
    ];

    let currentCustomerType = "";
    const fundSceneContainer = document.getElementById("fundSceneContainer");

    function renderFundSceneOptions(selectedValue = null) {
        const isChainStore = (currentCustomerType === "连锁门店");
        let optionsHtml = '';
        if (isChainStore) {
            optionsHtml = `<div class="radio-item">
                            <input type="radio" name="fundScene" value="platform_unified" id="fund_platform_fixed" checked disabled>
                            <label for="fund_platform_fixed" style="color:#2d3a5e;">平台/品牌方统一收款 (连锁门店固定模式)</label>
                          </div>`;
        } else {
            const defaultVal = selectedValue || "platform_unified";
            fundSceneOptions.forEach(opt => {
                const checkedAttr = (opt.value === defaultVal) ? 'checked' : '';
                optionsHtml += `<div class="radio-item">
                                    <input type="radio" name="fundScene" value="${opt.value}" id="fund_${opt.value}" ${checkedAttr}>
                                    <label for="fund_${opt.value}">${opt.label}</label>
                                </div>`;
            });
        }
        fundSceneContainer.innerHTML = optionsHtml;
    }

    const customerTypeSelect = document.getElementById('customerType');
    function updateFundSceneByCustomerType() {
        currentCustomerType = customerTypeSelect.value;
        renderFundSceneOptions();
    }

    customerTypeSelect.addEventListener('change', () => {
        updateFundSceneByCustomerType();
    });

    // 初始化渲染
    currentCustomerType = "";
    renderFundSceneOptions("platform_unified");

    function getSelectedFundScene() {
        const isChain = (customerTypeSelect.value === "连锁门店");
        if (isChain) return "platform_unified";
        const selectedRadio = document.querySelector('input[name="fundScene"]:checked');
        return selectedRadio ? selectedRadio.value : "";
    }

    function getSelectedPaymentNeeds() {
        const checkboxes = document.querySelectorAll('#paymentMultiselectPanel input[type="checkbox"]:checked');
        return Array.from(checkboxes).map(cb => cb.value);
    }

    function collectFormData() {
        const settlementRadio = document.querySelector('input[name="needSettlement"]:checked');
        const devAbilityRadio = document.querySelector('input[name="hasDevAbility"]:checked');
        return {
            customerName: document.getElementById('customerName').value.trim(),
            customerType: customerTypeSelect.value,
            industry: document.getElementById('industry').value,
            needSettlement: settlementRadio ? settlementRadio.value : "",
            hasDevAbility: devAbilityRadio ? devAbilityRadio.value : "",
            paymentNeeds: getSelectedPaymentNeeds(),
            fundScene: getSelectedFundScene(),
            businessDesc: document.getElementById('businessDesc').value.trim()
        };
    }

    function validateRequired(data) {
        const errors = [];
        if (!data.customerType) errors.push("请选择客户类型");
        if (!data.industry) errors.push("请选择所属行业");
        if (!data.needSettlement) errors.push("请选择是否分账");
        if (!data.hasDevAbility) errors.push("请选择客户是否有开发能力");
        if (!data.paymentNeeds || data.paymentNeeds.length === 0) errors.push("请选择收款方式");
        if (!data.fundScene && data.customerType !== "连锁门店") errors.push("请选择资金管理场景");
        if (data.customerType === "连锁门店" && !data.fundScene) errors.push("资金管理场景（连锁门店默认为统一收款）");
        return errors;
    }

    // 轻提示（非警告）
    function showSilentToast(msg, isError = false) {
        const toast = document.getElementById('silentToast');
        if (!toast) return;
        toast.textContent = msg;
        toast.style.backgroundColor = isError ? '#dc2626cc' : '#1f2a3ecc';
        toast.style.opacity = '1';
        setTimeout(() => {
            toast.style.opacity = '0';
        }, 2000);
    }

    // ========= 1. 【已生成方案】按钮：完全无视表单，不校验，直接跳转 =========
    function onDirectGenerate() {
        window.location.href = 'YiShengChengFangAn.html';
    }

    // ========= 新增：【草稿箱】按钮：直接跳转到草稿箱界面 =========
    function onOpenDraftBox() {
        window.location.href = 'caogaoxiang.html';
    }

    // ========= 2. 【保存到草稿箱】：不校验必填，保存到草稿列表并跳转 =========
    function onSaveDraft() {
        const formData = collectFormData();
        // 读取现有草稿列表
        let drafts = [];
        const storedDrafts = localStorage.getItem('t_marketing_drafts');
        if (storedDrafts) {
            try {
                drafts = JSON.parse(storedDrafts);
            } catch (e) {
                drafts = [];
            }
        }
        // 添加新草稿
        const newDraft = {
            id: 'draft_' + Date.now(),
            ...formData,
            savedAt: new Date().toISOString().slice(0, 10)
        };
        drafts.unshift(newDraft);
        // 保存草稿列表
        try {
            localStorage.setItem('t_marketing_drafts', JSON.stringify(drafts));
            localStorage.removeItem('t_marketing_draft');
            window.location.href = 'caogaoxiang.html';
        } catch(e) {
            showSilentToast("保存失败", true);
        }
    }

    // ========= 3. 【提交表单】：进行必填校验，通过后跳转生成页面 =========
    function onSubmitForm() {
        const formData = collectFormData();
        const errors = validateRequired(formData);
        if (errors.length > 0) {
            showSilentToast(errors[0], true);
            return;
        }
        console.log("[提交表单] 完整数据:", formData);
        localStorage.setItem('t_marketing_submitted_form', JSON.stringify(formData));
        localStorage.removeItem('t_marketing_draft');
        window.location.href = 'generating.html';
    }

    // 绑定事件
    document.getElementById('generateDirectBtn').addEventListener('click', onDirectGenerate);
    document.getElementById('draftBoxBtn').addEventListener('click', onOpenDraftBox);
    document.getElementById('saveDraftBtn').addEventListener('click', onSaveDraft);
    document.getElementById('submitFormBtn').addEventListener('click', onSubmitForm);

    // 可选：页面加载时读取草稿（体验增强）
    function loadDraftIfExists() {
        const draft = localStorage.getItem('t_marketing_draft');
        if (draft) {
            try {
                const data = JSON.parse(draft);
                if (data.customerName) document.getElementById('customerName').value = data.customerName;
                if (data.customerType) {
                    document.getElementById('customerType').value = data.customerType;
                    updateFundSceneByCustomerType(); // 触发联动
                }
                if (data.industry) document.getElementById('industry').value = data.industry;
                // 支付需求回填
                if (data.paymentNeeds && data.paymentNeeds.length) {
                    const checkboxes = document.querySelectorAll('#paymentNeedsGroup input');
                    checkboxes.forEach(cb => {
                        if (data.paymentNeeds.includes(cb.value)) cb.checked = true;
                    });
                }
                // 资金场景回填（非连锁门店下恢复选中）
                if (data.fundScene && data.customerType !== "连锁门店") {
                    const radioToCheck = document.querySelector(`input[name="fundScene"][value="${data.fundScene}"]`);
                    if (radioToCheck) radioToCheck.checked = true;
                }
                if (data.businessDesc) document.getElementById('businessDesc').value = data.businessDesc;
                if (data.painPoints) document.getElementById('painPoints').value = data.painPoints;
                if (data.dailyTrans) document.getElementById('dailyTrans').value = data.dailyTrans;
                if (data.existingSystem) document.getElementById('existingSystem').value = data.existingSystem;
                showSilentToast("已自动载入上次草稿内容", false);
            } catch(e) {}
        }
    }
    loadDraftIfExists();

    // 确保客户类型变化后资金场景正确渲染
    customerTypeSelect.addEventListener('change', () => {
        if (customerTypeSelect.value === "连锁门店") {
            // 自动锁定
        }
    });

    // 收款方式多选下拉框交互
    const paymentMultiselectBtn = document.getElementById('paymentMultiselectBtn');
    const paymentMultiselectPanel = document.getElementById('paymentMultiselectPanel');
    const paymentSelectedText = document.getElementById('paymentSelectedText');
    const multiselectWrapper = document.querySelector('.multiselect-wrapper');

    // 点击按钮切换下拉面板显示
    paymentMultiselectBtn.addEventListener('click', (e) => {
        e.stopPropagation();
        multiselectWrapper.classList.toggle('open');
    });

    // 点击面板外部关闭
    document.addEventListener('click', () => {
        multiselectWrapper.classList.remove('open');
    });

    // 点击面板内部不关闭
    paymentMultiselectPanel.addEventListener('click', (e) => {
        e.stopPropagation();
    });

    // 选择选项时更新显示文本
    paymentMultiselectPanel.querySelectorAll('input[type="checkbox"]').forEach((checkbox) => {
        checkbox.addEventListener('change', () => {
            const selected = getSelectedPaymentNeeds();
            if (selected.length === 0) {
                paymentSelectedText.textContent = '请选择收款方式';
            } else if (selected.length <= 3) {
                paymentSelectedText.textContent = selected.join('、');
            } else {
                paymentSelectedText.textContent = `已选${selected.length}项`;
            }
        });
    });
</script>
</body>
</html>
