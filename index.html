<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>原型展示库</title>
    <link rel="stylesheet" href="css/style.css?v=3">
</head>
<body>
    <div class="geometric-decoration"></div>
    
    <header>
        <div class="header-decoration"></div>
        <div class="container">
            <h1>Prototype Gallery</h1>
            <p>浏览和预览HTML原型设计</p>
            <div class="header-subtitle">
                <span>产品设计</span>
                <span>•</span>
                <span>UI/UX</span>
                <span>•</span>
                <span>原型设计</span>
            </div>
        </div>
    </header>

    <main class="container">
        <div class="toolbar">
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="搜索原型...">
                <button id="refreshBtn">
                    <span class="btn-icon"></span>
                    <span>刷新</span>
                </button>
            </div>
            
            <div class="upload-section">
                <label class="upload-btn">
                    <input type="file" id="fileInput" multiple accept=".html" hidden>
                    <span class="btn-icon upload-icon"></span>
                    <span>上传文件</span>
                </label>
                <button id="createFolderBtn" class="folder-btn">
                    <span class="btn-icon folder-icon"></span>
                    <span>新建文件夹</span>
                </button>
                <p class="admin-hint">*仅管理员可在本地操作</p>
            </div>
        </div>

        <div id="stats" class="stats">
            <div class="stat-item">
                <div class="number" id="totalCount">0</div>
                <div class="label">原型数量</div>
            </div>
            <div class="stat-item">
                <div class="number" id="folderCount">0</div>
                <div class="label">文件夹数量</div>
            </div>
        </div>

        <div id="prototypesGrid" class="prototypes-grid">
            <div class="loading">
                <div class="spinner"></div>
                <p>正在加载原型列表...</p>
            </div>
        </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="brand">Prototype Gallery</div>
            <div class="links">
                <a href="#">关于</a>
                <a href="#">帮助</a>
                <a href="#">联系</a>
            </div>
            <div class="copyright">© 棉被 版权所有</div>
        </div>
    </footer>

    <!-- 新建文件夹弹窗 -->
    <div id="folderModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>新建文件夹</h3>
                <button class="close-btn" onclick="closeFolderModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="text" id="folderNameInput" placeholder="输入文件夹名称">
                <textarea id="folderDescInput" placeholder="输入文件夹描述（可选）"></textarea>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeFolderModal()">取消</button>
                <button class="confirm-btn" onclick="createFolder()">创建</button>
            </div>
        </div>
    </div>

    <!-- 密码验证弹窗 -->
    <div id="passwordModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>请输入上传密码</h3>
                <button class="close-btn" onclick="closePasswordModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="password" id="passwordInput" placeholder="请输入密码">
                <p class="error-message" id="passwordError"></p>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closePasswordModal()">取消</button>
                <button class="confirm-btn" onclick="verifyPassword()">确认</button>
            </div>
        </div>
    </div>

    <!-- 上传进度弹窗 -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>上传文件</h3>
                <button class="close-btn" onclick="closeUploadModal()">✕</button>
            </div>
            <div class="modal-body">
                <div id="uploadFilesList"></div>
                <div id="uploadProgress" class="progress-bar">
                    <div class="progress-fill"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeUploadModal()">取消</button>
                <button class="confirm-btn" onclick="startUpload()">开始上传</button>
            </div>
        </div>
    </div>

    <!-- 重命名弹窗 -->
    <div id="renameModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>重命名原型</h3>
                <button class="close-btn" onclick="closeRenameModal()">✕</button>
            </div>
            <div class="modal-body">
                <input type="text" id="renameInput" placeholder="请输入新名称">
            </div>
            <div class="modal-footer">
                <button class="cancel-btn" onclick="closeRenameModal()">取消</button>
                <button class="confirm-btn" onclick="confirmRename()">确认</button>
            </div>
        </div>
    </div>

    <!-- 预览弹窗 -->
    <div id="previewModal" class="preview-modal">
        <div class="modal-header">
            <span class="title" id="previewTitle"></span>
            <button class="close-btn" onclick="closePreview()">✕</button>
        </div>
        <div class="modal-content">
            <iframe id="previewFrame"></iframe>
        </div>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
